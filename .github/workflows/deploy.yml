name: Innovation Exchange CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── JOB 1: Test Backend ──────────────────────────────────────────────────────
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check for syntax errors
        run: node --check src/server.js

      - name: Verify all modules load
        run: |
          node -e "require('./src/config/db')" || true
          node -e "require('./src/models/userModel')"
          node -e "require('./src/models/ideaModel')"
          node -e "require('./src/routes/authRoutes')"
          node -e "require('./src/routes/ideaRoutes')"
          node -e "require('./src/middleware/authMiddleware')"
          node -e "require('./src/services/encryptionService')"
          node -e "require('./src/services/cidUnlockService')"
          node -e "require('./src/services/escrowService')"
          node -e "require('./src/services/certificateService')"
          node -e "require('./src/services/innovationScoreService')"
          node -e "require('./src/services/similarityService')"
          echo "All modules loaded successfully"

      - name: Test encryption service
        run: |
          node -e "
          process.env.ENCRYPTION_KEY='a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2';
          const { encrypt, decrypt } = require('./src/services/encryptionService');
          const plain = 'test idea content';
          const enc = encrypt(plain);
          const dec = decrypt(enc);
          if (dec !== plain) throw new Error('Encryption test FAILED');
          console.log('Encryption test PASSED');
          "

      - name: Test fingerprint generation
        run: |
          node -e "
          const { generateFingerprint } = require('./src/models/ideaModel');
          const fp = generateFingerprint('test idea', 'user123', '1234567890');
          if (!fp || fp.length !== 64) throw new Error('Fingerprint test FAILED');
          console.log('Fingerprint test PASSED:', fp.substring(0,16) + '...');
          "

  # ── JOB 2: Security Audit ─────────────────────────────────────────────────────
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high || true

      - name: Check for hardcoded secrets
        run: |
          echo "Checking for hardcoded secrets..."
          if grep -r "sk_live_" src/ 2>/dev/null; then
            echo "WARNING: Possible live Stripe key found"
            exit 1
          fi
          if grep -r "password123" src/ 2>/dev/null; then
            echo "WARNING: Hardcoded password found"
            exit 1
          fi
          echo "No hardcoded secrets found"

  # ── JOB 3: Frontend Lint ──────────────────────────────────────────────────────
  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check frontend files exist
        run: |
          test -f frontend/index.html    && echo "index.html OK"
          test -f frontend/auth.js       && echo "auth.js OK"
          test -f frontend/idea.js       && echo "idea.js OK"
          test -f frontend/browse-ideas.html && echo "browse-ideas.html OK"
          test -f frontend/view-idea.html    && echo "view-idea.html OK"

      - name: Check API URL is production
        run: |
          if grep -r "localhost:5000" frontend/*.js frontend/*.html 2>/dev/null; then
            echo "WARNING: localhost URL found in frontend — should use production API"
            exit 1
          fi
          echo "All frontend files use production API"

  # ── JOB 4: Deploy notification ────────────────────────────────────────────────
  notify-deploy:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [test-backend, security-audit, lint-frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deployment summary
        run: |
          echo "================================================"
          echo "  Innovation Exchange — Deployment Pipeline"
          echo "================================================"
          echo "  Backend tests:    PASSED"
          echo "  Security audit:   PASSED"
          echo "  Frontend lint:    PASSED"
          echo "  Render deploy:    AUTO (triggered by push)"
          echo "  Vercel deploy:    AUTO (triggered by push)"
          echo "================================================"
          echo "  Live API:  https://innovation-exchange.onrender.com"
          echo "  Live App:  https://innovation-exchange.vercel.app"
          echo "================================================"
